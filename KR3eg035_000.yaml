body:
  text: 正文風寒暑濕燥火為天之六氣其中人也皆發熱惡寒頭疼身痛其邪從皮毛而入太陽經之所司也疫為地所蘊郁之氣其中人也亦發熱惡寒頭疼身痛其邪從口鼻而入肺胃之所司也六氣為天氣天氣輕清但中皮毛不入口鼻溫疫為地氣地氣重濁但入口鼻不中皮毛所入雖異所病則同若不於同處別其所異則六氣之寒熱皆得混指為疫是不可不首先辨之六氣之辨仲景論之詳矣今專言疫疫為地氣發不常有此氣一行病則少長率皆相似沿門闔戶互相傳染故說文釋疫字云民皆疾也無疫之年每春夏之間偶見一二症確乎是疫者不過地之偏氣由其人正氣偶傷為地氣所觸口鼻受之亦謂之疫口氣通於脾邪從口入必先於胃胃者脾之表也胃喜清通以下行為順胃受其濁胸膈必悶甚則兩脅亦脹不能下行勢必上逆不為噁心則為嘔噦鼻氣通於肺肺主氣以氣干氣尤易受邪經云上焦如霧濁邪壅閉則霧氣瀰漫為舌苔為頭目矇混六氣之中人初雖發熱惡寒頭疼身痛未嘗便有胸滿脅脹舌苔頭目蒙沸諸里症縱間有兼里症者亦必四五日後經氣鬱久而成初病則未嘗有也疫症才起諸里症與寒熱齊見蓋疫從口鼻而入本屬裡邪無關於表故見症異於太陽之表也得其所異以別其所同則是疫非疫可一問而決矣或曰疫從口鼻而入無關於表何以又有發熱惡寒頭疼身痛諸表症曰經云心營肺衛心肺俱在膈上今膈上被壅則營衛錯亂安得不惡寒發熱人之胃屬於頭胃壅故頭疼上中二焦被遏則周身之經氣皆遏故身痛此症不但異處有辨即同處亦略有辨六氣之寒熱由邪自外干故寒熱特甚疫則邪自內壅故惡寒不甚或半日一日便止後只發熱不惡寒其熱初在肌肉由內漸及於表里閉則表通雖灼熱而有汗六氣之頭疼身痛由邪氣搏擊於經疫則邪壅於內而致經氣阻遏雖疼不甚疼也不甚疼者無邪以搏擊也仲景傷寒論其中表里腑臟虛實寒熱頭緒紛繁每曰何以別之辨之明乃治之當不可忽也既別其症之所異次當明乎脈之所異異者何往來凝滯而有力也夫脈為血氣之先切脈之學即察氣之學也邪從口鼻而入壅閉肺胃上中二焦被壅則寸關之脈未有不壅者壅則凝滯而有力矣初得一二日寸關脈沉弦有力往來凝滯重按微數寸關沉弦者陽氣被遏而不能升也重按微數者陽氣被遏於下也往來凝滯者濁邪壅閉也三四日脈弦大有力甚則弦數弦大為壅遏之甚弦數為肝膽之陽遏而不宣肝膽之陽何以遏而不宣也考諸臟象無病之人肝膽之陽上入於心心有兩耳由右耳而入在心中細鍊自左耳而出其絡上通於肺肺屬金而畏火安能勝此陽火鍛鍊故開竅於鼻其熱由鼻而泄吸冷氣以涼心肺今肺氣被壅陽無出路故脈見弦數症見口苦喜嘔等症由少陽被遏非邪傳少陽也五六日邪傳愈深脈難預料或從正氣之盈虛而變或因治療之寒熱而更要之往來凝滯之脈始終自在也問症察脈既別其異次當明乎治法治法維何曰輕清以開肺舒氣芳香以醒胃辟邪地氣渾濁為汗穢之氣為不正之氣治以輕清芳香祛濁邪而復清陽方名清氣飲雖出杜撰實具至理其間開之醒之與正氣略無所損果遇疫症日服二三劑輕者即愈重者亦減歷試多人頗有效驗清氣飲杏霜二三錢桔梗一二錢蟬蛻去頭足二三錢銀花二三錢廣藿香二三錢蘇葉一錢或一錢五分神麯二三錢穀芽三四錢廣皮五七分半夏一錢赤茯苓二三錢水二小碗煎一碗溫服如未覺更進一服覺氣通舒暢是其驗也重者日三服杏霜桔梗苦以開肺蟬蛻輕清上升而從風化上焦如霧一經郁遏則霧氣瀰漫用蟬蛻者取清風生霧氣潛消之義銀花藿香蘇葉芳香闢穢散胸中不正之氣穀芽乃稻浸罯而成神麯乃面蒸罯而成凡蒸罯之物能舒郁遏同氣相求也廣皮辛香通陽半夏滑利通險赤苓利水三焦通暢何氣不清故曰清氣飲二小碗水煎一碗略煎便成取清芬未散耳疫症初起二三日內宜用此方四五日郁深則熱如有煩渴面紅等熱象本方去蘇葉易冬桑葉二三錢丹皮一錢或一錢五分口燥渴去廣皮半夏加瓜蔞根一二錢或蘆根五七錢煩熱口苦咽乾加黃芩一錢或一錢五分小便不利加白通草四五分或飛滑石二三錢腹脹大便閉喜冷惡熱加大黃三五錢或七八錢以上用諸涼藥須慎而又慎一劑不應便當揣摩不應之故恐似是而非也如寸口脈微弱為里陽不充於本方加玉竹五七錢蓋玉竹甘緩而不滯也乾隆二十二年暨五十一年皆大疫餘日治多人其用黃芩大黃者不過百人中之四五人耳如脈大而空或大而寸脈不滿或大雖似有力而往來凝滯症雖見煩躁舌焦諸熱象便防其人正虛如再見心中慌甚便非疫邪蓋疫為氣遏於內決不作慌也審屬正虛如補中益氣湯四君子湯六味地黃湯理中湯等類皆可擇宜而用蓋行疫之年未必人人皆疫亦有勞傷以及裡虛裡寒傷濕傷暑諸症夾雜其中所謂似是而非者全在細心體認疫雖互相傳染醫者不可為疫症所拘也清氣飲乃余訂以治暑之方經云寒傷形暑傷氣既云傷氣其入必於口鼻古人治暑諸方如香薷飲大順散人參白虎湯等類發散溫里清熱皆非治氣之方長夏炎蒸之氣從口鼻吸入之症最多其症發熱頭目昏蒙胸滿脅脹因訂此方用頗有效後逢行疫之年思疫從口鼻而入亦屬傷氣用之輒驗遂移為治疫之主方驗舌之法仲景傷寒論金匱要略雖間及之而實不以為重予少時疑其關略問諸前輩或以紅黃黑白分寒熱或以燥濕分寒熱及後驗之皆不足憑始悟仲景罕言之妙數十年來所見舌黑芒刺舌紅如朱服乾薑附子而愈者又不知凡幾舌白如粉之干舌白如腐之濕服黃芩石膏而愈者又不知凡幾可見治病全憑乎脈症尚不足憑何況區區之舌色仲景傷寒論六經之前有辨脈法平脈法猶匠之有規矩也有此規矩方可以治六經之病不但六經即萬病皆莫能逃莫能逃者寒熱虛實表裡腑臟之辨也疫氣二三日舌上確有白苔或如積粉或如濕腐如積粉者肺氣為疫壅塞也如濕腐者上焦如霧瀰漫而化水也四五日舌心漸黃黃者胃氣不得升降郁久成熱津液漸傷也愈久則愈傷焦黑芒刺也舌固如此勿盡據舌仍當以脈為據也余幼年見舌白如腐之濕疑從寒化用溫燥藥治之不效不得其解後思經言上焦如霧始悟霧氣不開即為雨而從水化也邪律楚材收大黃以治疫而大黃遂為疫症良藥何也曰通是也肺主氣肺氣壅閉則一身之氣皆閉大腸為肺之標大腸氣閉胃氣何從下行清氣飲三五劑不愈如見胸滿脅脹不惡寒反惡熱等症於方中加大黃三五錢大腸得通胃氣斯得下行為順往往大便通後汗出而愈蓋胃氣先得降而後能升升斯化汗汗生於穀精也但用大黃須要審人之虛實此症屬於氣閉取氣以通氣每有奇驗何謂取氣其法用大黃七八兩先以水潤透用小甑蒸之取露每用露半茶杯或半小碗對入飲內大便通而胃氣順其疫渙然而解此用大黃而無傷正氣與虛弱之人最為穩當又有湯泡一法用大黃二三錢沸湯略泡去渣俟藥煎成對服泡之法仍有輕重溫湯泡氣多而味少沸湯泡則氣味兼有也在臨時酌人之虛實用之外此又有煎法有同煎略煎之別大黃為血分藥如血分病宜於同煎氣分病宜於略煎略煎者取其氣也仲景論下法必俟表已解訖誠恐表邪不盡一經下早陷入胸中而成結胸痞滿等症有一毫惡寒不盡即為表不罷而禁下疫從口鼻而入本非表邪亦不惡寒故下之不厭早也若云疫症有表亦可下斷無此理疫從口鼻而入肺胃之氣被壅薰蒸膈膜久則膈膜氣結邪不易散故藥取芳香透膜為多如青荷葉醒頭草等類俱可擇用推之上等芽茶如陽羨龍井銀針松蘿其氣清芬皆可透膜逐邪戰汗由於正虛仲景辨脈篇脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出也云云浮緊表脈也芤空虛也是雖表症而得表脈裡氣不能協應何以能汗必待正氣來復與邪相爭爭則戰正氣勝而後逐邪外出仲景雖未出治法一則曰此為本虛再則曰其人本虛而治法已寓其中矣無論浮緊凡一切大浮數動滑之陽脈按之一芤便當豫從裡氣綢繆以助其戰勝之機若再加消導清涼戕伐生氣不但不能戰汗且恐戰而內脫玩仲景脈浮而緊專指表言疫從口鼻而入斷無浮緊之脈疫為氣鬱於內亦斷無按之反芤之脈即或戰汗亦是鬱極得通與正氣相搏而戰雖與傷寒戰汗不同而其人本虛則一也凡系行疫之時審系疫症脈見微弱無力便當滋培本氣吳又可瘟疫論以戰而不汗者危中氣虧危也次日復戰厥不回汗不出者死正氣脫不勝其邪也云云彼亦明知中氣虧危正不勝邪藥則仍主達原飲三消飲承氣等湯不且自相矛盾耶乾隆二十二年歲在丁丑江蘇大疫沿門闔戶熱症固多寒症亦有大抵寒熱兩途總由其人之秉賦素秉陽虛縱染疫邪亦多從寒化素秉陽旺再經邪郁其熱愈勝仲景陽明篇首一條云陽明之為病胃家實也胃家實不是病症指其人素秉陽旺胃氣素實一經表邪郁遏而火流就燥成其為三承氣之實症古人治病必先問其平日飲食起居不然從何知其胃家實也是先有實之因一經得病而後方成實之證非一切表邪皆能成三承氣之實症也發斑一症疫在氣分者得宣通而解疫干營分者必發斑而解發斑有斑疹兩宗成塊平塌者為斑顆粒成點者為疹斑色紅為熱紫為熱甚紫而帶青則不治如見紅紫成塊之斑清氣飲去陳皮半夏加當歸赤芍大黃以下之疹則寒熱虛實均有之大熱疫邪發疹為邪向外順其性而疏散之自然得愈余臨症數十年斑症僅見數人疹症最多凡將發疹或發熱腹痛或壯熱指尖冷或昏悶心煩蓋心主營邪干於營故有如上諸症疹症以燈照之隱隱有跡疏解而不外達虛者補托之寒者溫散之內實者少加大黃以利之補托如補中益氣湯之類溫散如蔥姜之類語云大荒之後必有大疫驗之信然乾隆二十一年荒二十二年疫五十年荒五十一年疫水荒為偏災雖荒不得為大惟三時三伏無雨亢燥之氣郁遏土中至秋冬雖雨所遏之氣已經凝結水土不相和地之陰陽二氣俱偏陰閉於外陽鬱於內交春雨水節後地氣上升陰鬱先起多為寒症陽郁後起多為熱症其疫初起人受之多三陰症用四逆理中等湯二三劑即愈一月後漸有熱症繼後熱症多而寒症少顯屬地氣瘟疫論云天地之戾氣天氣清純決不為疫亦不入於口鼻也吳又可瘟疫論發明疫從口鼻而入誠千古不易之理但其立論著方不無可議如達原飲檳榔厚朴草果皆破氣峻烈之品原病云本氣適逢虧欠呼吸之間外邪因而乘之云云可見邪乘虛入雖云留而不去其病則實治當一意逐邪然於逐邪之中何妨稍存正氣地步又邪氣鬱閉必化為熱亦必俟三四日後其熱方實今甫受邪末必化熱如此之速方中便用黃芩知母無熱可清必致傷其陽氣陽氣一傷不但變症蜂起且恐內陷根於是矣或曰達原飲不可用耶曰非也必審其人形色充盛聲音雄壯症見煩渴脈息實大有力未嘗不可用也要亦十中之一人耳若一概用之鮮有不誤者仲景小柴胡湯用黃芩是何等慎重少陽篇首一條云少陽之為病口苦咽乾目眩也口苦者膽熱而氣蒸於上也咽乾者膽脈絡於咽而火氣上炎也目眩者風火之氣搖動也此三症專指黃芩而言有此三症方可用黃芩蓋黃芩為清膽熱之品膽為甲木為東方生氣十一臟皆秉此生氣故經云十一臟皆取決於膽而可妄行戕伐乎生氣一傷未有不輕病變重重病變危者近日達原飲之殺人比比皆是由其意中只知瘟疫論一書除瘟疫論而外皆未嘗深究甚至未嘗寓目此倡彼和不至敗壞不止及至敗壞藉口內陷使早知顧惜正氣何至內陷方案中預寫緊防內陷四字而藥仍攻擊不為預防於先而欲令病家自防於後不思彼若能防請醫何事疫從口鼻而入上焦之氣被壅舌上白苔者氣為邪結也舌根漸黃至中央者邪壅於胃也加大黃以通其大腑胃氣得以下行陽氣自得上升自然汗解何須三消飲之羌活葛根柴胡不思邪從口鼻而入斷無從皮毛而出之理表藥無表可散必致散及正氣正氣一傷變可立待不可不慎也仲景三承氣湯為陽明胃實而設胃氣素秉亢燥承其氣而治之即經云亢則害承乃制之義也今疫症氣結於上腸結於下加大黃以通其腸胃氣得下行為順而後正氣得升疫邪自解無承製之義不過取通而已枳樸芒硝切宜斟酌瘟疫論引用仲景五苓散桃仁承氣湯抵當湯此仲景為太陽經犯本而設何為犯本足太陽胱膀經為多氣多血之經營衛均主之風傷衛分郁久不散邪干本經氣分小便不利五苓散利其水而衛陽得升寒傷營分郁久不散邪干本經血分少腹急結桃仁承氣湯攻其血而營陰自和二方中俱用桂枝以其從太陽經來也甚則瘀血凝結少腹硬痛不可近抵當湯主之此太陽經之所有余經則無也疫從口鼻而入與膀胱毫無干涉若云由胃失下而瘀及血分何以仲景陽明篇絕不一言其不能幹於血分也明矣疫症小便不利頗有之由氣閉於上失其清肅下行之道開其肺氣小便立通若利水則大謬瘟疫論辨明傷寒時疫曰夫傷寒必有感冒之因或卑衣風露或強力入水或臨風脫衣或當檐出浴當覺肌肉粟起既而四肢拘急惡風惡寒然後身疼頭痛發熱惡寒脈浮而數脈緊無汗為傷寒脈緩有汗為傷風雲云不知仲景傷寒論包六氣而言天之六氣傷及太陽膀胱寒水之經故曰傷寒今云傷寒必有感冒之因常見感冒並未有因即卑衣風露強力入水等因六經俱可受病不止太陽一經亦不止風寒兩途又云傷寒投劑一汗而解治傷寒寧如是之易乎由其意中只知瘟疫尚未知傷寒二字作何解說也疫為地氣自口鼻而入瘟疫論只言口入忘其鼻入故用方絕無一味開肺之品不知鼻入較口入尤多人有時不言未有一刻不呼吸者瘟疫論云傷寒時疫皆能傳胃至是同歸於一故用承氣輩導邪而出要之傷寒時疫始異而終同也云云傷寒與時疫一是天氣一是地氣其原不同治法亦異傷寒之傳胃由其人胃氣素實實者胃陽強胃陰弱也一經表郁胃氣已熱火流就燥胃氣益實仲景之用硝黃雖曰瀉陽實是救陰也未必人人皆胃實症症皆傳胃矧今人虛者多實者少寒者多熱者少溫補養正而愈者十中五六何嘗盡用承氣也疫從口入必先於胃又何用傳胃氣以下行為順用大黃者通其下行之道路也與傷寒用承氣之義迥別何同歸於一之有瘟疫論云時疫之邪匿於膜原根深蒂固云云膜原是穴名不是經名疫從口入胃經是其所舍疫是邪之氣氣在胃膈膜受其薰蒸是以取乎芳香非芳香不能透膜也何嘗是匿又何嘗根深蒂固良由不知芳香透膜之理遂覺根深蒂固矣瘟疫論云陰症世間罕有云云從前諸說尚屬小誤此一名印定後人眼目殺人無止矣予臨症數十年三陰之病無日無之設學者奉又可之言讀書時不向三陰篇討論臨症時不向三陰症著想而世之死於三陰者伊誰之過耶嗚乎立言不可不慎也瘟疫論以溫病之溫字即瘟字省文溫即瘟也云云瘟指邪氣言為實邪溫指正氣言為虛邪經言冬傷於寒春必病溫又云冬不藏精至春發為溫病藏於精者春不病溫精者精明之陽氣也冬令陽氣潛藏於腎水之中是其常也傷其腎水陽不能藏陽無水氣涵養是謂亢陽至春亢陽發動是謂溫病仲景云太陽病發熱而渴不惡寒者為溫病亢陽內發故發熱而渴邪非外來故不惡寒與瘟從口鼻而入者大相懸絕此等溫病治惟滋陰壯水為主若概作瘟疫治之吾知其不死於溫病而必死於瘟藥矣世之宗瘟疫論者十人而九但見發熱惡寒不論何經不論虛實寒熱春則曰春瘟夏則曰時疫秋則曰秋疫冬則曰冬瘟方則寒涼峻厲加減出入立案不敘脈症之理但曰瘟疫幾朝症重防變醫者既先立不敗之地及至敗壞則案中原已載明與醫無涉予實恥之因取又可之書細加論定予非敢輕議前人實有不忍不言者閱者幸鑑其苦心恕其狂妄可也歲庚申西垣先生以此稿質之家君家君命琥抄錄一本藏於家塾乙丑夏琥病幾危服先生藥頓愈先生曰水災三年病從寒化吾治邵伯人病每以桂附鹿茸投之輒愈非吳又可所能知也嘗因傷寒例寒疫二字及蘇長公用龐氏聖散子治疫之法推究以盡其變又得兩千言今先生沒求其兩千言不可得略言梗概以俟知者焦延琥識李翁醫記上乾隆己亥先人病臂痛不能舉時學師夏君善醫術往乞其診以為將成偏枯時余與史壽莊同筆硯壽莊祖蓮溪徵君指求翁視之翁笑曰天下無此偏枯證脈署方黑豆半升蠶砂二兩為末服之盡即已服未盡而痛失近問之翁已不記矣是年為識翁之始庚戌冬十月㬠余病嘔血夜嘔數升嘔已而咳或曰陰虛所為服瓊玉膏咳益甚余極駭血已而咳者多不治也訪翁翁曰病在濕舒其陽則愈咳果已當是時猶未信翁之神也歲丁巳婦妊脈忽嘔逆不已每嘔必厥日十數度七晝夜不進飲食進飲食則嘔嘔時時有蛔族人有自謂能醫者日投以藥皆不應厥益劇急迎翁翁診良久曰咳否婦頷曰有之每嘔則有微咳倡其先翁曰是宜從脈立秋幣月肺金乘權而右寸獨沉病得之失治表表鬱於里肺失疆而肝火擾寒熱相擊所以嘔且厥也用桂枝十六分乾薑五分黃連七分半夏甘草各等分手摘藥趨之服曰服已必熟睡或疑其語之決也已而服藥果然蓋七夜不能瞑至是呼吸聞於外舉家相慶二更許睡醒突大呼目上視手振搐搖首面赤而厥族人以醫不效自慚復妒翁之能見是狀大言歸咎於桂枝乾薑迫令灌以梨汁齒齘不受家母曰仍宜問翁翁時猶未睡聞是即入診病者仰臥不知人喉中喘息翁曰非厥也兩寸脈浮藥已有效左右或咻之翁耳語謂余曰無畏適席間豬蹄湯甚濃吹去浮脂灌之以醒為度如其言且灌且醒復酣睡遂霍然翁曰嘔七日胃中液涸寒氣升而枯竭露也嗚乎向令翁不診必殺於他藥且以薑桂詈矣則世之謗翁者果翁之咎耶自是至明年戊午四月婦產女次日稱胸背急痛少選嘔厥如舊年市一日命在呼吸家母即命迎翁翁至值婦痛輾轉於狀慘切不忍言少時嘔逆手掣搐而厥翁曰此時脈不可據然去年之厥責在嘔今日之厥責在痛吾觀其由痛而嘔由嘔而厥痛已則嘔與厥皆已矣不可遲速治藥乃書炙甘草二十分芍藥十分阿膠十分曰此血虛而肝氣乘之急食甘肝急自緩藥入口痛必平藥熟值痛起趨飲之如翁言是秋余在省病腸澼阻風燕磯日數十利痛苦實甚俟至揚迎翁診之余意用姜附或曰宜大黃也翁曰此表證何澼為暑淫血分耳一藥可愈用藿香半夏之輩加當歸以入血五穀蟲以通大腸一服而日夜之利盡除惟雞鳴後腹痠痛連利數次以告翁翁以金銀花治之二服全已癸丑夏吾母病衄衄已出黃涕醫令服蔗漿阿膠羚羊角服之困甚於是頭痛右臂右足掣痛而倦翁曰病得之陰虛天令炎熱肝陽上衝故衄黃涕者肝之餘氣也頭屬胃胃之絡脈行於右故見諸證不必治衄惟宜養肝滋胃土用白芍山藥扁豆甘草四劑而愈甲子冬余每日大便後則由肛門達於尻骨痠痛不可耐得飯乃已翁曰此水氣也水氣傷腎陽腎陽虛而脾氣下乘故脹於便後得食少緩者陽氣足而能攝也此水氣非附子不能祛非多服不能效乃以鹿角膠熟地黃枸杞菟絲子山茱萸山藥當歸合附子服之始服小便夜多而汗且瀉翁曰此水氣外泄也何疑之翁治病多用白朮至此獨以術為戒他醫以白朮合鹿角霜鹿角膠破故紙服之則汗斂而痛復劇仍服翁藥三十劑而愈而族人之自謂能醫者忌翁甚每向余短之余復惑於其言歲乙丑六月余幼孫病竟為此族人誤藥致死越一月餘子廷琥病每巳午未三時則頭面熱如火蒸兩肺前穴煩擾不可耐氣促神躁不大便惡水不飲溲短而黃翁始以暑治之不應溫以薑朮不應面有紅跡似疹日益見時閏六月二十五日翁清晨至曰君之孫已為醫誤此子所關甚重然病情穩曲今終夜思之前此非所治也當由心陰傷而心陽上越姑試以甘溫署甘草大棗等令服未服而身亦有疹大如戎豆色且紫他醫議用快斑發疹之劑翁又至曰脈弦微而不渴何敢用涼藥且未有疹出而躁若此者是時躁甚坐臥行立皆不寧翁曰試以前藥服之服已而躁定翁曰未也俟之良久果又躁且呼手足不仁臍下亦不仁漸及於胃脘間翁曰急矣吾今日必愈此疾乃去急治藥促煎之跣足袒衣自調其水火診脈凡七八次藥熟又診脈久之自持藥令服日是矣服之必愈時正躁急持其母手而呼藥既入遂能臥而諸苦頓失面上之疹悉沒惟熱蒸尚存翁曰腎氣虛虛則寒昨所服者真武湯也氣分之寒消而血分之寒未去宜溫血服炮薑當歸山萸熟地黃甘草入口遂酣睡蒸熱悉除越三日便膿血或曰熱藥所致翁聞之急至曰非澼也少陰之寒升於厥陰用理中湯加吳茱萸服十劑膿血自止服之果然余於此始恍然於忌之謗之者真為庸醫而翁之醫真能神也方廷琥之服真武湯而勢始定其妻忽大呼遍體麻木不知人腹中胎上逼喘促欲笑或曰宜投紫蘇飲時三鼓翁方去聞此復至診良久曰非子懸也病得之悲傷驚恐氣血虛且亂治其虛則胎即安署熟地黃白朮炙甘草當歸重其劑投之而胎果定是日也非翁力則兒與婦皆危矣翁神於醫而其拯人之急不畏勞煩不恤人言尤當於道誼學問中求之余嘗南遊吳越北及燕齊見醫者多矣持一藥曰服之必熟睡曰藥入口痛必平曰服之必愈危急在旦夕而爭命於須臾轉移之機其應如響翁之外有幾人能乎哉吾友汪叔震述江漪堂侍讀之言曰此翁老後不可復得惜市人無知之者余與唐竹虛孝廉論醫於京師竹虛亦稱翁不已昔元好問述李東垣之醫宋濂述戴原禮之醫皆仿史遷之述倉公也翁之可述者多矣謹錄為余家治效者於上其得諸傳聞者異其辭李翁醫記下黃解元承吉之叔父病傷寒有葉生者治以薑朮而煩減將服附子翁診曰胃熱斂於脾故減耳更溫則脾爛矣服大黃生服附子死葉不能爭投以大承氣兩目珠戴入於腦翁曰熱縱也又下之目珠出而頸軟頭不能直翁曰熱遁於足太陽加滑石甘草下之愈葉生乃服江鶴亭之弟心培病傷寒煩甚服清涼之品未已醫議下翁診曰病為格陽服附子生服大黃死服附子狂走目眥溢血他醫悉謗翁翁曰寒競也力任其治倍附子加人參服之愈余門人吳潤之叔母七月病寒熱服姜而昏不知人一醫投大黃一醫投附子昏益深諸醫皆曰脈無根中死法翁診之獨曰不中死法脈弦而緩非無根病得之暑傷手少陰心用大黃附子皆死用散藥生令服鮮紫蘇汁即能言索飲食他醫明日診之皆曰脈有根不中死法郡中一人病腹痛似少陰證醫以姜附溫之益燥擾不能寐延翁視之翁曰此非姜附證若得數百年石灰投之當立起適坐客有從大同來者篋中蓄此物言得之長城土中即煎一錢與之果定更一服下蟲數百頭而愈知者少陰脈必虛細今乍大乍小而有力唇且紅色不定非寒乃蟲也得溫愈擾故以灰殺之周小濂病牙齦潰爛久不愈醫莫能治延翁翁適衣破衣周睨之翁既診不署方而行周怪問故翁曰此病非吾藥莫能治然君睨吾輕我也雖立方必不服何方為周謝之翁曰此病非吾藥莫能治然君輕我必不服吾藥不服吾藥則必死請屏諸醫吾獨任其治不愈甘受罰乃用人參二錢附子三錢服五十劑而愈李艾堂痛疝醫溫之不應翁診曰陰壅也用半夏湯通之愈明年病腹痛翁適赴河帥召客淮上他醫以為濕治以茵陳病益劇將死矣翁歸急視之令服防風粥已而下白糞如銀病頓已李遂名其屋為防風館趙仰葵習於醫母病腹痛不敢自治卜之曰三日死翁診之曰三日愈病得之陽氣陷於陰以吳茱萸人參治之已趙謝之翁又診曰未也脈有燥氣日午必煩宜小承氣湯已而果煩下之愈汪氏女或曰即汪劍潭司馬之女弟病咳羸瘠兩目畏日醫以地黃治之翁曰服地黃必厥果厥乃以甘草生炙各半治之八十日愈病得之陰虛極極虛者不可以重補以炙草益陽以生陰以生草緩陽以強陰也商僕某每晨起咯血醫治以地黃翁診曰病得之內而遇驚膽蓄熱夜騰於胃至晨而出於地黃藥加豬膽汁曰服藥病加則生服藥病果加以溫膽湯治之愈引地黃入膽試之也病加知所測之不誤矣翁幼年從師學師治一傷寒曰身如負杖陰證也治以姜附不效師辭不治翁竊視之治以大青龍湯明日愈師大駭異治酒問翁曰子何所見而若此翁曰吾思負杖之人身必不能轉動故以狀陰證之身痛今見其人輾轉於床時起時臥口呼痛而身不靜非所云骨節煩疼者耶故姑汗之不意竟效師大悅即令行醫周生者病頭痛翁診之曰是有鬼氣乘之或疑其言之奇未幾目果見鬼物翁曰鬼附於肝不能自去驅鬼必以風用羌活獨活川芎細辛防風荊芥升麻甘松一切升陽發散之品為末服之而愈生名金聲遂師事翁有老人年八十病泄瀉他醫用止瀉藥翁診之曰非瀉也止瀉則死令以雞子入豬肪煮之服一百日服至三十日瀉益甚他醫治其瀉瀉止而食不能下歙縣金殿撰轉之為老人之戚奇翁之方仍令如翁言復能食又百日而瀉自減江漪堂侍讀之子婦產後發寒熱手舞且笑俗所謂驚風也醫曰宜涼翁曰宜溫治以涼益劇翁令以蔥數斤與布同煮以布貼少腹病果已翁曰古人灸百會穴為委曲溫之吾所本也唐樸存孝廉病暑不溲利之清之皆不效勢危篤翁治以蟬脫即溲病由暑氣塞於上焦上焦如霧非風不驅蟬性輕清暑愈酷而愈鳴用之為清風之吹也王東山病虛勞柴立腰脅刺痛呼吸將絕醫辭不治翁診之曰血瘀也宜金匱百勞丸法用乾漆大黃䗪蟲桃仁當歸尾治之便黑血鬥許而蘇越十數日即能會文於轉運署中語余曰子素稱李翁今誠然已而試於省積勞病發至冬復殂翁每惜之明年邵伯鎮一貧婦人病咳嗽吐血形枯神瘁待命於床蓐翁始署滋陰公用之藥忽顧所供神曰我無以對此復診之曰血瘀尚可治亦用百勞丸而愈邵伯鎮一人壯年病吐血延鎮江蔡姓醫治以甘寒月餘血止而飲食倍於常偶請翁診之翁曰中除也胃陽盡伐消食者腎陽也法不治辭不與藥半月果死鮑席芬尊人病咽不能食厚幣迎吳中醫顧雨田費千金以方示翁翁曰服之夜必煩果如其言吳醫慚愧去翁曰此陽結也宜重劑下之署大黃一兩其家未敢盡劑明日翁診曰服藥宜必效不效者未全服也仍署大黃一兩趨服之一藥而能食葉文光尊人舌腫若菌翁曰木竭也脈既散甲乙之氣先亡木葉落即不起果如其言觀察和公騰額兩足瘠弱不能行以禮延翁翁感其知己為留三月治之而愈翁始診之曰足未病之先陽必痿有之乎公曰有之陽未痿肌肉即羸瘠乎曰然翁曰病宜治脾以及肝少用白朮茯苓甘草而加白蒺藜一兩五錢公奇之以問王獻廷獻廷京口名醫也曰李之學足為吾輩師其用意豈吾之所能知也宜從之必有效服數十劑不易方果愈翁壯年嘗以歲暮避人於吳有病咳者吳醫張亮葵治之不應翁診曰此可為也治以川椒明日咳止張使人問之翁曰寐則咳醒則已蓋寐則肺氣藏於腎腎寒使之咳耳通其陽故愈張極歎服約訂交而翁辭歸有市井小男病喉喘促將死其父母卑詣翁翁曰病在少陰誤服寒藥故至此急溫之溫之而愈其父母貧人也方翁為之診問几子曰止此翁惻然久之曰吾不盡力為爾治子必死於是反復求之而得也時乾隆辛亥冬十二月歐陽制美無故忽鬚眉萎落醫投細辛等藥十劑不效且及於發將禿矣遍求醫莫能治翁曰此風淫於皮膚間也令煉松脂和粥食之兩月而鬚髮皆長至今猶服松脂也翁治徐直生員外家一寒證曰宜附子理中湯病家曰已服二劑矣服之煩躁翁曰姑服吾藥服之遂愈問其故翁曰湯名理中者重在甘草白朮乾薑彼用附子倍於姜故劇吾用附子半於姜故愈名醫李君墓誌銘嘉慶十年秋七月名醫李君卒卒之日予家人兒女咸哀泣湖中農人有泣於路者皆君所活也先是閏月予子女及子婦病瀕於危君活之距君之卒止一月君諱炳字振聲號曰西垣儀徵縣人幼習三世之書苦不能得其蘊乃學易十年而有得曰治病之要不外陰陽消息而已陽生陰死醫為人求其生故必使陽長而陰消用寒涼峻厲則傷其元惟陽主通汗吐下所以亨也利者義之和其德在秋火亢必有以和之火齊白虎所以和也用陰以輔陽非用以伐陽貞元相續而天行所以不已也時予有說易之書謂易之當位即岐伯所云當位君見之欣然曰醫理在易先生可與言醫矣君又曰帝出乎震震為木木者人之所以始也肝膽之氣存則生消則死俗醫嫉肝木如寇仇務制而勝之生氣乃日損而人壽益促君尤所自得者曰肝之本在右而行於左學者駭其言多攻之歙人汪彥超為舉一證曰秦越人書謂肝七葉左三右四右羸其一斯為本乎予亦舉為兩證曰肝為乙木乙為庚妻妻必從夫宜其本在右鄭康成之莊周禮疾醫也言肝氣涼肺氣熱賈公彥申其說云肝在心下近右其氣當秋是肝右之說不始自君矣然予驗之十數年凡右脅痛者君以甘緩之和以芍藥無不應手痊治肺必劇乃知君以積驗得之真能發前人所未言可為後世法也彼攻者烏足以知之君苦金匱無善注乃撰金匱要略注二十二卷能抉其微錄生平治驗之案為西垣診籍惡吳又可瘟疫論之惑人也作辨疫瑣言以糾之謂大黃治疫本於邪律楚材又可竊之而不知其義妄造達原飲用草果黃芩以剝人生氣且疫為陰濁入人口鼻當以芳香勝之立清氣飲用大黃有漬法釀法同煮略煮諸法取其氣而不取其味意尤造於微嗚乎習醫者多不通經或有假經語以為緣飾者又莫能發其精微以會通於神農黃帝之旨自宋金元明以來能好學深思心知其意者其惟君乎君卒年七十七遺孤止二歲是年九月葬君於蜀岡之陰君為貧人賤士治疾必竭盡心力寒暑莫夜聞召即行而短於伺候富室顯者故身後無餘財胸有定見不善隨眾浮沉病已則戒勿藥不屑以調理為名奔走射利或制一方令服百劑數十劑不更增損均與世俗醫相反而識者遂稀至於生死在呼吸之際人攻君補人塞君通人寒君熱以口舌爭之而不足以身名性命誓而決之手調其藥而坐驗其啜不效不已及其愈也所報或無一錢君以為快嘗往來吳越荊楚之間所交落落然而談論風采間者好之說醫之文簡而有法間為詩歌不甚溺也予既錄其診籍為李翁醫記復述其生平梗概及學之所得以垂於石銘曰惟人思之知君術之神惟人嫉之知君學之真財利所在護之他人拙於求富巧於濟貧人喜用克君獨以春贈以陽和不殺而仁每乘舴艋泛我湖漘囊中有帙指奧而醇人驚論創實中於倫為語學者維茲有津問而師之以保庶民
